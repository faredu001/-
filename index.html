<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥局同步系統</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 請替換下方資訊 ---
        const SUPABASE_URL = 'https://fsznlgxfmgqmykllhabq.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzem5sZ3hmbWdxbXlrbGxoYWJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjE2MzAsImV4cCI6MjA4ODA5NzYzMH0.UO5btEp_d9yQFddBRSz8vrTxiSfUpQBwEqO3LqVkfqI';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function OrderApp() {
            const [orders, setOrders] = useState([]);
            const [newName, setNewName] = useState('');

            // 讀取資料
            const fetchOrders = async () => {
                const { data, error } = await supabase
                    .from('orders')
                    .select('*')
                    .order('created_at', { ascending: false });
                if (data) setOrders(data);
            };

            useEffect(() => { fetchOrders(); }, []);

            // 新增資料
            const addOrder = async () => {
                if (!newName) return;
                await supabase.from('orders').insert([{ name: newName, status: '待處理' }]);
                setNewName('');
                fetchOrders();
            };

            // 更新狀態 (會自動更新資料庫的 created_at)
            const updateStatus = async (id, status) => {
                // 我們手動更新時間戳記以反應「最後修改時間」
                await supabase.from('orders')
                    .update({ status, created_at: new Date().toISOString() })
                    .eq('id', id);
                fetchOrders();
            };

            // 刪除
            const deleteOrder = async (id) => {
                await supabase.from('orders').delete().eq('id', id);
                fetchOrders();
            };

            return (
                <div className="max-w-2xl mx-auto p-6">
                    <h1 className="text-2xl font-bold text-emerald-700 mb-4">🌐 藥局雲端同步系統</h1>
                    <div className="flex gap-2 mb-6">
                        <input className="flex-1 border p-2 rounded" value={newName} onChange={e => setNewName(e.target.value)} placeholder="病人姓名..." />
                        <button onClick={addOrder} className="bg-emerald-600 text-white px-4 py-2 rounded">新增</button>
                    </div>
                    <div className="space-y-3">
                        {orders.map(o => (
                            <div key={o.id} className="bg-white p-4 rounded shadow flex justify-between items-center">
                                <div>
                                    <div className="font-bold">{o.name}</div>
                                    <div className="text-xs text-gray-400">{new Date(o.created_at).toLocaleString()}</div>
                                    <div className="text-sm text-blue-600">{o.status}</div>
                                </div>
                                <div className="flex gap-1">
                                    <button onClick={() => updateStatus(o.id, '配藥中')} className="text-xs bg-gray-100 p-1 border rounded">配藥中</button>
                                    <button onClick={() => updateStatus(o.id, '待領取')} className="text-xs bg-yellow-50 p-1 border rounded">待領取</button>
                                    <button onClick={() => updateStatus(o.id, '已領取')} className="text-xs bg-green-50 p-1 border rounded">已領取</button>
                                    <button onClick={() => deleteOrder(o.id)} className="text-xs text-red-300 ml-2">❌</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrderApp />);
    </script>
</body>
</html>
