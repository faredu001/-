<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥局訂單管理系統</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function OrderApp() {
            const [orders, setOrders] = useState([]);
            const [newName, setNewName] = useState('');

            useEffect(() => {
                const saved = localStorage.getItem('orders');
                if (saved) setOrders(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('orders', JSON.stringify(orders));
            }, [orders]);

            const addOrder = () => {
                if (!newName.trim()) return;
                const newOrder = {
                    id: Date.now(),
                    name: newName,
                    status: '待處理',
                    time: new Date().toLocaleString('zh-TW', { hour12: false })
                };
                setOrders([newOrder, ...orders]);
                setNewName('');
            };

            const updateStatus = (id, status) => {
                setOrders(orders.map(o => o.id === id ? { ...o, status, time: new Date().toLocaleString('zh-TW', { hour12: false }) } : o));
            };

            const deleteOrder = (id) => setOrders(orders.filter(o => o.id !== id));

            return (
                <div className="max-w-2xl mx-auto p-4 md:p-8">
                    <h1 className="text-2xl font-bold text-blue-800 mb-6">🏥 藥局訂單時間戳記系統</h1>
                    <div className="flex gap-2 mb-6">
                        <input 
                            className="flex-1 border p-2 rounded" 
                            value={newName} 
                            onChange={e => setNewName(e.target.value)}
                            placeholder="輸入病人姓名..."
                        />
                        <button onClick={addOrder} className="bg-blue-600 text-white px-4 py-2 rounded">新增</button>
                    </div>
                    <div className="space-y-4">
                        {orders.map(o => (
                            <div key={o.id} className="bg-white p-4 rounded shadow border-l-4 border-blue-500 flex flex-col md:flex-row justify-between items-center">
                                <div>
                                    <div className="font-bold text-lg">{o.name}</div>
                                    <div className="text-xs text-gray-400">{o.time}</div>
                                    <div className="text-sm font-medium text-orange-600 mt-1">{o.status}</div>
                                </div>
                                <div className="flex gap-2 mt-3 md:mt-0">
                                    <button onClick={() => updateStatus(o.id, '配藥中')} className="bg-gray-100 text-xs px-2 py-1 rounded border">配藥中</button>
                                    <button onClick={() => updateStatus(o.id, '待領取')} className="bg-yellow-100 text-xs px-2 py-1 rounded border">待領取</button>
                                    <button onClick={() => updateStatus(o.id, '已領取')} className="bg-green-100 text-xs px-2 py-1 rounded border text-green-700">已領取</button>
                                    <button onClick={() => deleteOrder(o.id)} className="text-red-300 text-xs ml-2">刪除</button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrderApp />);
    </script>
</body>
</html>
