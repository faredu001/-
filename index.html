<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥局網路訂單系統</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 💡 請在此處填入你的 Supabase 資訊 ---
        const SUPABASE_URL = 'https://fsznlgxfmgqmykllhabq.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzem5sZ3hmbWdxbXlrbGxoYWJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjE2MzAsImV4cCI6MjA4ODA5NzYzMH0.UO5btEp_d9yQFddBRSz8vrTxiSfUpQBwEqO3LqVkfqI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // 藥品資料庫 (由你提供的截圖轉譯)
        const MEDICINES = [
            { code: "BC26406100", name: "Jardiance 恩排糖 10mg", price: 750 },
            { code: "BC26405100", name: "Jardiance 恩排糖 25mg", price: 790 },
            { code: "BC25537100", name: "Trajenta 糖漸平 5mg", price: 390 },
            { code: "BC25792100", name: "Trajenta Duo 糖倍平 2.5/850mg", price: 560 },
            { code: "BC26476100", name: "Forxiga 福適佳 10mg", price: 650 },
            { code: "AC42556100", name: "ARICEPT 愛憶欣 5mg", price: 1150 },
            { code: "BC27473100", name: "ARICEPT EVESS 愛憶欣口崩錠 10mg", price: 1250 },
            { code: "BC27039100", name: "Jardiance Duo 恩美糖 12.5/850mg", price: 850 },
            { code: "BC27073100", name: "Glyxambi 糖順平 25/5 mg", price: 1000 },
            { code: "BA24469100", name: "BARACLUDE 貝樂克 0.5mg", price: 2200 },
            { code: "BC27117100", name: "XIGDUO XR 釋多糖 10/1000mg", price: 1350 },
            { code: "BC25350100", name: "LIVALO 力清之 2mg", price: 295 },
            { code: "BC27283100", name: "ATOZET 優泰脂 10/20mg", price: 440 }
        ];

        function OrderApp() {
            const [cart, setCart] = useState({});
            const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });
            const [isSubmitting, setIsSubmitting] = useState(false);

            // 計算總金額
            const totalAmount = Object.keys(cart).reduce((sum, code) => {
                const item = MEDICINES.find(m => m.code === code);
                return sum + (item.price * (cart[code] || 0));
            }, 0);

            // 處理數量變更
            const handleQtyChange = (code, qty) => {
                const val = parseInt(qty) || 0;
                setCart(prev => ({ ...prev, [code]: val }));
            };

            // 格式化訂單文字用於 LINE
            const exportToLine = () => {
                if (!customer.name || !customer.phone) return alert("請填寫姓名與電話");
                
                let text = `【藥局新訂單】\n`;
                text += `👤 姓名：${customer.name}\n`;
                text += `📞 電話：${customer.phone}\n`;
                text += `🏠 地址：${customer.address}\n`;
                text += `----------\n`;
                
                MEDICINES.forEach(m => {
                    if (cart[m.code] > 0) {
                        text += `■ ${m.name} x ${cart[m.code]}\n`;
                    }
                });
                
                text += `----------\n`;
                text += `💰 總計金額：$${totalAmount}\n`;
                text += `⏰ 訂購時間：${new Date().toLocaleString()}`;

                navigator.clipboard.writeText(text);
                alert("訂單內容已複製！現在可以去 LINE 貼上了。");
            };

            // 提交到 Supabase
            const submitOrder = async () => {
                if (totalAmount === 0) return alert("請至少選擇一項商品");
                setIsSubmitting(true);
                
                const { error } = await supabaseClient.from('orders').insert([{
                    name: customer.name,
                    status: `電話:${customer.phone} / 金額:${totalAmount}`,
                    created_at: new Date().toISOString()
                }]);

                setIsSubmitting(false);
                if (error) alert("傳送失敗：" + error.message);
                else alert("訂單已成功傳送至藥局！");
            };

            return (
                <div className="max-w-xl mx-auto bg-white min-h-screen shadow-lg">
                    <div className="bg-blue-600 p-6 text-white">
                        <h1 className="text-xl font-bold text-center">💊 藥局網路預約訂購系統</h1>
                    </div>

                    <div className="p-4 space-y-6">
                        {/* 藥品列表 */}
                        <div className="space-y-3">
                            <h2 className="font-bold border-l-4 border-blue-500 pl-2">選擇商品</h2>
                            {MEDICINES.map(item => (
                                <div key={item.code} className="flex justify-between items-center border-b pb-2">
                                    <div className="flex-1">
                                        <div className="text-sm font-medium">{item.name}</div>
                                        <div className="text-xs text-gray-500">${item.price} / 單位</div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <input 
                                            type="number" 
                                            min="0"
                                            className="w-16 border rounded p-1 text-center"
                                            placeholder="0"
                                            onChange={(e) => handleQtyChange(item.code, e.target.value)}
                                        />
                                    </div>
                                </div>
                            ))}
                        </div>

                        {/* 總金額 */}
                        <div className="bg-blue-50 p-4 rounded-lg flex justify-between items-center">
                            <span className="font-bold">目前總金額：</span>
                            <span className="text-2xl font-black text-blue-700">${totalAmount}</span>
                        </div>

                        {/* 顧客資訊 */}
                        <div className="space-y-3 bg-gray-50 p-4 rounded-lg">
                            <h2 className="font-bold border-l-4 border-gray-400 pl-2">收件資訊</h2>
                            <input 
                                className="w-full border p-2 rounded" 
                                placeholder="姓名 (必填)" 
                                onChange={e => setCustomer({...customer, name: e.target.value})}
                            />
                            <input 
                                className="w-full border p-2 rounded" 
                                placeholder="電話 (必填)" 
                                onChange={e => setCustomer({...customer, phone: e.target.value})}
                            />
                            <input 
                                className="w-full border p-2 rounded" 
                                placeholder="收件地址" 
                                onChange={e => setCustomer({...customer, address: e.target.value})}
                            />
                        </div>

                        {/* 功能按鈕 */}
                        <div className="flex flex-col gap-3 pb-10">
                            <button 
                                onClick={submitOrder}
                                disabled={isSubmitting}
                                className="w-full bg-blue-600 text-white font-bold py-3 rounded-lg hover:bg-blue-700"
                            >
                                {isSubmitting ? '處理中...' : '確認下單 (存入系統)'}
                            </button>
                            <button 
                                onClick={exportToLine}
                                className="w-full bg-green-500 text-white font-bold py-3 rounded-lg hover:bg-green-600 flex items-center justify-center gap-2"
                            >
                                💬 轉成文字分享到 LINE
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrderApp />);
    </script>
</body>
</html>
