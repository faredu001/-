<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>藥局自動化訂單系統</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://fsznlgxfmgqmykllhabq.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzem5sZ3hmbWdxbXlrbGxoYWJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjE2MzAsImV4cCI6MjA4ODA5NzYzMH0.UO5btEp_d9yQFddBRSz8vrTxiSfUpQBwEqO3LqVkfqI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function OrderApp() {
            const [medicines, setMedicines] = useState([]);
            const [cart, setCart] = useState({});
            const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });
            const [loading, setLoading] = useState(true);

            // 自動從資料庫抓取藥品
            useEffect(() => {
                const fetchProducts = async () => {
                    const { data, error } = await supabaseClient
                        .from('商品表')
                        .select('*')
                        .order('id', { ascending: true });
                    if (data) setMedicines(data);
                    setLoading(false);
                };
                fetchProducts();
            }, []);

            const totalAmount = Object.keys(cart).reduce((sum, code) => {
                const item = medicines.find(m => m.code === code);
                return item ? sum + (item.price * (cart[code] || 0)) : sum;
            }, 0);

            const exportToLine = () => {
                if (!customer.name || !customer.phone) return alert("請填寫姓名與電話");
                let text = `【藥局新訂單】\n👤 姓名：${customer.name}\n📞 電話：${customer.phone}\n🏠 地址：${customer.address}\n----------\n`;
                medicines.forEach(m => {
                    if (cart[m.code] > 0) text += `■ ${m.name} x ${cart[m.code]} 盒\n`;
                });
                text += `----------\n💰 總計：$${totalAmount}\n⏰ 時間：${new Date().toLocaleString()}`;
                navigator.clipboard.writeText(text);
                alert("訂單已複製，請至 LINE 貼上");
            };

            const submitOrder = async () => {
                if (totalAmount === 0) return alert("請選擇商品");
                const { error } = await supabaseClient.from('orders').insert([{
                    name: customer.name,
                    status: `電話:${customer.phone} / 總額:${totalAmount}`,
                    created_at: new Date().toISOString()
                }]);
                if (!error) alert("訂單已傳送至雲端！");
            };

            if (loading) return <div className="p-10 text-center">載入藥品清單中...</div>;

            return (
                <div className="max-w-xl mx-auto bg-white min-h-screen shadow-xl">
                    <div className="bg-emerald-600 p-6 text-white text-center">
                        <h1 className="text-2xl font-bold">🏥 雲端藥局預約系統</h1>
                        <p className="text-emerald-100 text-sm mt-1">即時同步門市資料庫</p>
                    </div>

                    <div className="p-5 space-y-6">
                        <section>
                            <h2 className="font-bold text-gray-700 mb-3 flex items-center gap-2">
                                <span className="bg-emerald-500 w-1 h-5 rounded"></span> 選擇藥品 (單位：盒)
                            </h2>
                            <div className="space-y-2">
                                {medicines.map(item => (
                                    <div key={item.code} className="flex justify-between items-center p-3 bg-gray-50 rounded-lg border border-gray-100">
                                        <div className="flex-1">
                                            <div className="font-bold text-gray-800">{item.name}</div>
                                            <div className="text-emerald-600 font-mono text-sm">${item.price} / 盒</div>
                                        </div>
                                        <input 
                                            type="number" min="0" className="w-20 border-2 border-gray-200 rounded-md p-1 text-center focus:border-emerald-500 outline-none"
                                            onChange={(e) => setCart({...cart, [item.code]: parseInt(e.target.value) || 0})}
                                        />
                                    </div>
                                ))}
                            </div>
                        </section>

                        <div className="bg-emerald-50 border-2 border-emerald-100 p-4 rounded-xl flex justify-between items-center">
                            <span className="font-bold text-emerald-800">應付金額：</span>
                            <span className="text-3xl font-black text-emerald-600">${totalAmount}</span>
                        </div>

                        <section className="space-y-3">
                            <h2 className="font-bold text-gray-700 flex items-center gap-2">
                                <span className="bg-gray-400 w-1 h-5 rounded"></span> 訂購人資訊
                            </h2>
                            <input className="w-full border p-3 rounded-lg" placeholder="姓名" onChange={e => setCustomer({...customer, name: e.target.value})} />
                            <input className="w-full border p-3 rounded-lg" placeholder="電話" onChange={e => setCustomer({...customer, phone: e.target.value})} />
                            <input className="w-full border p-3 rounded-lg" placeholder="地址" onChange={e => setCustomer({...customer, address: e.target.value})} />
                        </section>

                        <div className="grid grid-cols-1 gap-3 pb-10">
                            <button onClick={submitOrder} className="bg-emerald-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-emerald-700 transition">確認下單</button>
                            <button onClick={exportToLine} className="bg-green-500 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-green-600 flex justify-center items-center gap-2">
                                💬 複製訂單並分享至 LINE
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrderApp />);
    </script>
</body>
</html>
