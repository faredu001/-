<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商品雲端下單系統</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = 'https://fsznlgxfmgqmykllhabq.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzem5sZ3hmbWdxbXlrbGxoYWJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjE2MzAsImV4cCI6MjA4ODA5NzYzMH0.UO5btEp_d9yQFddBRSz8vrTxiSfUpQBwEqO3LqVkfqI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function OrderApp() {
            const [medicines, setMedicines] = useState([]);
            const [cart, setCart] = useState({});
            const [customer, setCustomer] = useState({ name: '', phone: '', address: '' });
            const [shipping, setShipping] = useState('常溫');
            const [loading, setLoading] = useState(true);

            const shippingFee = shipping === '常溫' ? 60 : 160;

            useEffect(() => {
                const fetchProducts = async () => {
                    const { data } = await supabaseClient.from('商品表').select('*').order('id', { ascending: true });
                    if (data) setMedicines(data);
                    setLoading(false);
                };
                fetchProducts();
            }, []);

            const productTotal = Object.keys(cart).reduce((sum, code) => {
                const item = medicines.find(m => m.code === code);
                return item ? sum + (item.price * (cart[code] || 0)) : sum;
            }, 0);

            const finalTotal = productTotal > 0 ? productTotal + shippingFee : 0;

            const handleOrder = async () => {
                if (!customer.name.trim() || !customer.phone.trim() || !customer.address.trim()) return alert("請填妥收件人必填資訊");
                if (productTotal === 0) return alert("請選擇下單商品");

                const orderItems = medicines.filter(m => cart[m.code] > 0).map(m => `${m.name}*${cart[m.code]}盒`).join('、');
                const combinedInfo = `姓名:${customer.name} / 電話:${customer.phone} / 地址:${customer.address}`;
                const statusDetail = `【${shipping}】${orderItems} / 總計:$${finalTotal}(含運)`;

                const { error } = await supabaseClient.from('orders').insert([{
                    customer_info: combinedInfo,
                    status: statusDetail,
                    created_at: new Date().toISOString()
                }]);

                if (!error) {
                    const lineText = `【新訂單 - ${shipping}】\n👤 姓名：${customer.name}\n📞 電話：${customer.phone}\n🏠 地址：${customer.address}\n----------\n📦 品項：${orderItems}\n💰 總計：$${finalTotal}\n----------\n系統已自動存檔，點擊連結跳轉 LINE：`;
                    await navigator.clipboard.writeText(lineText);
                    alert("訂單已送出並複製內容！即將跳轉至 LINE App。");
                    window.location.href = "https://lin.ee/XUCTd0x";
                }
            };

            if (loading) return <div className="p-10 text-center text-emerald-600 font-bold">門市連線中...</div>;

            const categories = ["處方和OTC", "保健品", "醫材"];

            return (
                <div className="max-w-xl mx-auto bg-white min-h-screen shadow-lg pb-10">
                    <div className="bg-emerald-600 p-6 text-white text-center">
                        <h1 className="text-2xl font-bold">商品網路下單系統</h1>
                        <div className="text-[11px] mt-3 bg-emerald-700 p-2 rounded leading-relaxed border border-emerald-500/50">
                            🚚 商品皆不含運，常溫品60元起可宅配或便利商店；冷藏160元起黑貓宅配
                        </div>
                    </div>

                    <div className="p-5 space-y-8">
                        {categories.map(cat => (
                            <section key={cat}>
                                <h2 className="font-bold text-emerald-800 border-l-4 border-emerald-500 pl-2 mb-3">{cat}</h2>
                                <div className="space-y-3">
                                    {medicines.filter(m => m.category === cat).map(item => (
                                        <div key={item.code} className="flex justify-between items-center bg-gray-50 p-3 rounded-lg border border-gray-100">
                                            <div className="flex-1">
                                                <div className="text-sm font-bold text-gray-800">{item.name}</div>
                                                <div className="text-emerald-600 font-mono text-xs">${item.price} / 盒</div>
                                            </div>
                                            {item.stock > 0 ? (
                                                <input type="number" min="0" placeholder="0" className="w-16 border-2 border-emerald-100 p-1 rounded text-center focus:border-emerald-500 outline-none" onChange={(e) => setCart({...cart, [item.code]: parseInt(e.target.value) || 0})} />
                                            ) : (
                                                <span className="text-red-500 text-[10px] font-bold bg-red-50 px-2 py-1 border border-red-100 rounded">補貨中</span>
                                            )}
                                        </div>
                                    ))}
                                </div>
                            </section>
                        ))}

                        <div className="bg-amber-50 p-4 rounded-xl border-2 border-amber-200 space-y-3 shadow-sm">
                            <p className="font-bold text-amber-900 text-sm flex items-center gap-2">🚛 選擇運送溫層 (必選)：</p>
                            <div className="flex gap-8 px-2">
                                <label className="flex items-center gap-2 cursor-pointer font-medium text-amber-800">
                                    <input type="radio" checked={shipping === '常溫'} onChange={() => setShipping('常溫')} className="w-4 h-4 accent-amber-600" /> 常溫 ($60)
                                </label>
                                <label className="flex items-center gap-2 cursor-pointer font-medium text-amber-800">
                                    <input type="radio" checked={shipping === '冷藏'} onChange={() => setShipping('冷藏')} className="w-4 h-4 accent-amber-600" /> 冷藏 ($160)
                                </label>
                            </div>
                        </div>

                        <div className="bg-emerald-600 p-5 rounded-2xl flex justify-between items-center text-white shadow-lg">
                            <span className="font-bold tracking-widest text-emerald-100 italic">應付總額 (含運)：</span>
                            <span className="text-3xl font-black">${finalTotal}</span>
                        </div>

                        <section className="space-y-3 bg-slate-50 p-5 rounded-2xl border border-slate-200">
                            <h2 className="font-bold text-gray-700 text-sm">📋 訂購人資訊</h2>
                            <input className="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-emerald-500 outline-none text-sm" placeholder="收件人姓名" onChange={e => setCustomer({...customer, name: e.target.value})} />
                            <input className="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-emerald-500 outline-none text-sm" placeholder="收件電話" onChange={e => setCustomer({...customer, phone: e.target.value})} />
                            <input className="w-full border-2 border-gray-200 p-3 rounded-xl focus:border-emerald-500 outline-none text-sm" placeholder="完整收件地址" onChange={e => setCustomer({...customer, address: e.target.value})} />
                        </section>

                        <button onClick={handleOrder} className="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl hover:bg-emerald-700 active:scale-95 transition-all text-lg shadow-emerald-200">
                            ✅ 確認訂購並開啟 LINE
                        </button>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OrderApp />);
    </script>
</body>
</html>
