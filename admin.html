<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>藥師管理後台 - 訂單與庫存</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
    <div id="admin-root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // 連接你的 Supabase
        const SUPABASE_URL = 'https://fsznlgxfmgqmykllhabq.supabase.co'; 
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzem5sZ3hmbWdxbXlrbGxoYWJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjE2MzAsImV4cCI6MjA4ODA5NzYzMH0.UO5btEp_d9yQFddBRSz8vrTxiSfUpQBwEqO3LqVkfqI';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        function AdminApp() {
            const [orders, setOrders] = useState([]);
            const [prods, setProds] = useState([]);
            const [activeTab, setActiveTab] = useState('orders'); // 'orders' or 'stock'

            const fetchData = async () => {
                const { data: o } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
                const { data: p } = await supabaseClient.from('商品表').select('*').order('id');
                if (o) setOrders(o);
                if (p) setProds(p);
            };

            useEffect(() => { fetchData(); }, []);

            const updateStock = async (id, newStock) => {
                const { error } = await supabaseClient.from('商品表').update({ stock: parseInt(newStock) }).eq('id', id);
                if (!error) fetchData();
            };

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-8">
                    <header className="flex justify-between items-center border-b border-gray-700 pb-6 mb-8">
                        <h1 className="text-2xl font-bold text-emerald-400">👨‍⚕️ 藥師管理系統</h1>
                        <div className="flex bg-gray-800 rounded-lg p-1">
                            <button onClick={() => setActiveTab('orders')} className={`px-4 py-2 rounded-md transition ${activeTab === 'orders' ? 'bg-emerald-600 text-white' : 'text-gray-400'}`}>訂單查看</button>
                            <button onClick={() => setActiveTab('stock')} className={`px-4 py-2 rounded-md transition ${activeTab === 'stock' ? 'bg-emerald-600 text-white' : 'text-gray-400'}`}>庫存/商品管理</button>
                        </div>
                    </header>

                    {activeTab === 'orders' ? (
                        <div className="space-y-4">
                            <h2 className="text-xl font-semibold mb-4 text-orange-400 italic">最新收到的訂單</h2>
                            {orders.map(o => (
                                <div key={o.id} className="bg-gray-800 border-l-4 border-emerald-500 p-5 rounded-r-lg shadow-lg flex flex-col md:flex-row gap-6">
                                    <div className="md:w-1/3">
                                        <div className="text-xs text-gray-500 mb-1 font-mono">{new Date(o.created_at).toLocaleString()}</div>
                                        <div className="text-emerald-300 font-medium whitespace-pre-wrap">{o.customer_info}</div>
                                    </div>
                                    <div className="flex-1 bg-gray-900 p-3 rounded border border-gray-700 text-sm leading-relaxed">
                                        <span className="text-gray-500 block mb-1 underline">訂單內容與溫層：</span>
                                        {o.status}
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="space-y-8">
                            {["處方和OTC", "保健品", "醫材"].map(cat => (
                                <section key={cat}>
                                    <h3 className="text-lg font-bold text-gray-400 mb-3 pl-2 border-l-2 border-gray-500">{cat}</h3>
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                        {prods.filter(p => p.category === cat).map(p => (
                                            <div key={p.id} className="bg-gray-800 p-4 rounded-lg flex justify-between items-center border border-gray-700">
                                                <div className="mr-4">
                                                    <div className="font-bold text-sm">{p.name}</div>
                                                    <div className="text-xs text-gray-500">${p.price}</div>
                                                </div>
                                                <div className="flex items-center gap-2">
                                                    <span className="text-xs text-gray-400">庫存:</span>
                                                    <input 
                                                        type="number" 
                                                        className="w-20 bg-black border border-gray-600 text-emerald-400 p-1 text-center rounded"
                                                        defaultValue={p.stock}
                                                        onBlur={(e) => updateStock(p.id, e.target.value)}
                                                    />
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('admin-root')).render(<AdminApp />);
    </script>
</body>
</html>
