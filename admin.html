<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>藥師後台 - 訂單與庫存管理</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-slate-100">
    <div id="admin-root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;
        const supabaseClient = supabase.createClient('https://fsznlgxfmgqmykllhabq.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZzem5sZ3hmbWdxbXlrbGxoYWJxIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1MjE2MzAsImV4cCI6MjA4ODA5NzYzMH0.UO5btEp_d9yQFddBRSz8vrTxiSfUpQBwEqO3LqVkfqI');

        function AdminApp() {
            const [orders, setOrders] = useState([]);
            const [prods, setProds] = useState([]);
            const [view, setView] = useState('orders');

            const refresh = async () => {
                const { data: o } = await supabaseClient.from('orders').select('*').order('created_at', { ascending: false });
                const { data: p } = await supabaseClient.from('商品表').select('*').order('id');
                if (o) setOrders(o);
                if (p) setProds(p);
            };

            useEffect(() => { refresh(); }, []);

            const updateStock = async (id, s) => {
                await supabaseClient.from('商品表').update({ stock: parseInt(s) || 0 }).eq('id', id);
                refresh();
            };

            const updateCategory = async (id, c) => {
                await supabaseClient.from('商品表').update({ category: c }).eq('id', id);
                refresh();
            };

            return (
                <div className="p-6 max-w-6xl mx-auto">
                    <div className="flex justify-between items-center mb-10 border-b border-slate-700 pb-5">
                        <h1 className="text-2xl font-black text-emerald-400 tracking-tighter">👨‍⚕️ 藥師後台中心</h1>
                        <nav className="flex gap-2 bg-slate-800 p-1 rounded-xl">
                            <button onClick={()=>setView('orders')} className={`px-6 py-2 rounded-lg font-bold transition ${view==='orders'?'bg-emerald-600 text-white':'text-slate-400'}`}>訂單管理</button>
                            <button onClick={()=>setView('stock')} className={`px-6 py-2 rounded-lg font-bold transition ${view==='stock'?'bg-emerald-600 text-white':'text-slate-400'}`}>庫存與分類</button>
                        </nav>
                    </div>

                    {view === 'orders' ? (
                        <div className="space-y-4">
                            {orders.map(o => (
                                <div key={o.id} className="bg-slate-800 p-5 rounded-2xl border-l-4 border-emerald-500 shadow-xl flex flex-col md:flex-row gap-6">
                                    <div className="md:w-1/3">
                                        <div className="text-[10px] text-slate-500 font-mono mb-2">{o.created_at}</div>
                                        <div className="text-emerald-300 font-bold leading-relaxed">{o.customer_info}</div>
                                    </div>
                                    <div className="flex-1 bg-slate-900/50 p-4 rounded-xl border border-slate-700 text-sm">
                                        <div className="text-slate-500 text-xs mb-2">訂單明細：</div>
                                        {o.status}
                                    </div>
                                </div>
                            ))}
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                            {prods.map(p => (
                                <div key={p.id} className="bg-slate-800 p-5 rounded-2xl border border-slate-700 flex flex-col justify-between gap-4">
                                    <div>
                                        <div className="font-bold text-lg mb-1">{p.name}</div>
                                        <div className="text-xs text-slate-500 font-mono">CODE: {p.code}</div>
                                    </div>
                                    <div className="space-y-3">
                                        <div className="flex items-center justify-between text-sm">
                                            <span>庫存數量：</span>
                                            <input type="number" value={p.stock} className="bg-slate-900 border border-slate-600 w-24 p-1 rounded text-center text-emerald-400" onChange={(e)=>updateStock(p.id, e.target.value)} />
                                        </div>
                                        <div className="flex items-center justify-between text-sm">
                                            <span>分類：</span>
                                            <select value={p.category} className="bg-slate-900 border border-slate-600 p-1 rounded text-xs" onChange={(e)=>updateCategory(p.id, e.target.value)}>
                                                <option value="處方和OTC">處方和OTC</option>
                                                <option value="保健品">保健品</option>
                                                <option value="醫材">醫材</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('admin-root')).render(<AdminApp />);
    </script>
</body>
</html>
